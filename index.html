<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>株っくす</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="メインナビゲーション">
        <a class="brand" href="#home" data-route="home" aria-label="株っくす ホーム">
          <span class="brand-mark">株</span>
          <span class="brand-name">株っくす</span>
        </a>
        <nav class="nav-stack">
          <button class="nav-item active" data-route="home" type="button"><span>ホーム</span></button>
          <button class="nav-item" data-route="search" type="button"><span>検索</span></button>
          <button class="nav-item" data-route="bookmarks" type="button"><span>ブックマーク</span></button>
          <button class="nav-item" data-route="notifications" type="button"><span>通知</span></button>
          <button class="nav-item" data-route="profile" type="button"><span>プロフィール</span></button>
        </nav>
        <button class="primary-button nav-compose" data-open-composer type="button">投稿する</button>
        <div class="viewer-card" id="viewerCard"></div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <button class="mobile-brand" data-route="home" type="button">
            <span class="brand-mark">株</span>
            <span>株っくす</span>
          </button>
          <button class="ghost-button mobile-compose" data-open-composer type="button">投稿</button>
        </header>

        <section class="auth-panel" id="authPanel" aria-label="ユーザー登録とログイン"></section>

        <section class="view active" id="homeView" aria-label="ホーム">
          <div class="section-head">
            <div>
              <p class="eyebrow">日本株SNS</p>
              <h1>ホーム</h1>
            </div>
            <button class="primary-button compact" data-open-composer type="button">投稿</button>
          </div>
          <div class="tab-bar" role="tablist" aria-label="タイムライン">
            <button class="tab active" data-feed="globalRecommended" type="button">おすすめ</button>
            <button class="tab" data-feed="globalChrono" type="button">時系列</button>
            <button class="tab" data-feed="followingRecommended" type="button">フォローおすすめ</button>
            <button class="tab" data-feed="followingChrono" type="button">フォロー時系列</button>
          </div>
          <div class="composer inline-composer" id="inlineComposer"></div>
          <div class="feed" id="feed"></div>
        </section>

        <section class="view" id="searchView" aria-label="検索">
          <div class="section-head">
            <div>
              <p class="eyebrow">投稿・ユーザー・タグ</p>
              <h1>検索</h1>
            </div>
          </div>
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="#7203、トヨタ、ユーザーID">
          </label>
          <div class="search-grid">
            <button class="filter-chip active" data-search-kind="all" type="button">すべて</button>
            <button class="filter-chip" data-search-kind="posts" type="button">投稿</button>
            <button class="filter-chip" data-search-kind="users" type="button">ユーザー</button>
            <button class="filter-chip" data-search-kind="tags" type="button">ハッシュタグ</button>
          </div>
          <div class="feed" id="searchResults"></div>
        </section>

        <section class="view" id="bookmarksView" aria-label="ブックマーク">
          <div class="section-head">
            <div>
              <p class="eyebrow">あとで読む</p>
              <h1>ブックマーク</h1>
            </div>
          </div>
          <div class="feed" id="bookmarkFeed"></div>
        </section>

        <section class="view" id="notificationsView" aria-label="通知">
          <div class="section-head">
            <div>
              <p class="eyebrow">簡易通知</p>
              <h1>通知</h1>
            </div>
          </div>
          <div class="notice-list" id="notifications"></div>
        </section>

        <section class="view" id="profileView" aria-label="プロフィール">
          <div id="profile"></div>
        </section>
      </main>

      <aside class="right-rail" aria-label="市場トピック">
        <div class="rail-block">
          <h2>注目タグ</h2>
          <div class="tag-cloud" id="tagCloud"></div>
        </div>
        <div class="rail-block">
          <h2>有益ランキング</h2>
          <div id="usefulRanking"></div>
        </div>
        <div class="rail-block market-card">
          <h2>市場メモ</h2>
          <div class="mini-chart" aria-hidden="true">
            <span style="height: 34%"></span>
            <span style="height: 48%"></span>
            <span style="height: 42%"></span>
            <span style="height: 66%"></span>
            <span style="height: 58%"></span>
            <span style="height: 79%"></span>
            <span style="height: 72%"></span>
          </div>
          <p>リポストより引用、いいねより有益。短期の煽りより、根拠ある分析を上に出す設計です。</p>
        </div>
      </aside>
    </div>

    <div class="modal-backdrop" id="composerModal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-head">
          <h2 id="modalTitle">投稿を作成</h2>
          <button class="icon-button" data-close-modal type="button" aria-label="閉じる">×</button>
        </header>
        <div class="composer" id="modalComposer"></div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
